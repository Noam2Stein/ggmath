[package]
name = "ggmath"
version = "0.14.0"
edition = "2024"
rust-version = "1.90.0"

readme = "README.md"
repository = "https://github.com/Noam2Stein/ggmath"
license = "MIT OR Apache-2.0"

description = "A games/graphics math library with generic SIMD types"
keywords = ["aabb", "math", "matrix", "simd", "vector"]
categories = [
    "data-structures",
    "game-development",
    "graphics",
    "mathematics",
    "no-std",
]

[features]
right = []
left = []
up = []
down = []
forwards = []
backwards = []

std = []

assert = []
debug_assert = []

default = ["std", "debug_assert"]
full = ["right", "left", "up", "down", "forwards", "backwards"]

[workspace]
members = [".", "examples/sandbox"]
